events {}

http {
    server {
        listen 80;

        location / {
            proxy_pass http://app:8080;

            # FIX: Timeouts — NGINX won't hang waiting for dead backend
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;

            # FIX: Proper headers forwarded to backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # FIX: Return 503 with message instead of raw 502
            error_page 502 503 = @backend_down;
        }

        location @backend_down {
            return 503 "Service temporarily unavailable. Please try again.";
        }
    }
}
