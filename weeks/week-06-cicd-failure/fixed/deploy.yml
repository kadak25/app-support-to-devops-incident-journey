name: Deploy App

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # FIX 1: Java 17 — required for Spring Boot 3.x
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      # FIX 2: pom.xml dependency version corrected — build succeeds
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # FIX 3: Dockerfile is at project root, not ./infra/
      - name: Build Docker image
        run: docker build -f ./Dockerfile -t incident-app:latest .

      # FIX 4: Secrets added in GitHub repo Settings > Secrets and variables > Actions
      - name: Push to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/incident-app:latest
          docker logout
